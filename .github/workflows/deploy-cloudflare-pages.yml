name: Deploy Burn.Blue to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.154.5'
          extended: true

      - name: Build Hugo site
        run: hugo --gc --minify
        env:
          HUGO_ENV: production

      - name: Verify built output
        run: |
          test -f public/index.html
          test -f public/deploy-marker.txt
          ! grep -R "{{ define" public/index.html
          grep -q "<!doctype html" public/index.html

      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4.105.0 pages deploy public --project-name=burn-blue-website --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
