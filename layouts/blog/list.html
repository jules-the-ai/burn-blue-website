{{ define "main" }}
<section class="page-hero"><div class="container"><span class="eyebrow">Burn.Blue insights</span><h1>{{ .Title }}</h1>{{ with .Description }}<p class="lead">{{ . }}</p>{{ end }}</div></section>
<section><div class="container"><div class="blog-grid">{{ range .Pages.ByDate.Reverse }}<article class="blog-card"><p class="article-meta">{{ .Date.Format "Jan 2, 2006" }}{{ with .Params.kicker }} · {{ . }}{{ end }}</p><h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2><p>{{ .Description }}</p><a class="text-link" href="{{ .RelPermalink }}">Read article →</a></article>{{ end }}</div></div></section>
{{ end }}
